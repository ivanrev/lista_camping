<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camping · Primera semana de julio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --forest: #2C3E2D;
    --forest-deep: #1E2B1F;
    --canvas: #F2EAD8;
    --canvas-card: #FBF7EE;
    --clay: #C7642C;
    --ochre: #B98A2E;
    --sky: #3E6E73;
    --ink: #2B2620;
    --ink-soft: #6B6256;
    --line: #DCD0B6;
    --danger: #B03030;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background-color: var(--canvas);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(44,62,45,0.05) 0, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(199,100,44,0.06) 0, transparent 45%);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .topo{
    position: fixed; inset: 0; z-index: 0;
    opacity: 0.05; pointer-events: none;
    background-image: repeating-radial-gradient(circle at 50% 0%, transparent 0, transparent 38px, var(--forest) 39px, transparent 40px);
    background-size: 600px 600px;
  }

  header{
    background: linear-gradient(180deg, var(--forest) 0%, var(--forest-deep) 100%);
    color: var(--canvas);
    padding: 20px 20px 18px;
    position: relative; z-index: 1;
    border-bottom: 3px solid var(--clay);
  }
  .header-top{
    display:flex; align-items:flex-start;
    justify-content:space-between; gap:12px;
    margin-bottom:14px;
  }
  .header-actions{
    display:flex; flex-direction:column; gap:7px;
    align-items:flex-end; flex-shrink:0;
  }
  .hdr-btn{
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--canvas);
    font-family:'Inter',sans-serif;
    font-size:12px; font-weight:600;
    padding: 6px 12px; border-radius:20px;
    cursor:pointer; white-space:nowrap;
    transition: background .15s;
    letter-spacing:.02em;
  }
  .hdr-btn:hover{ background: rgba(255,255,255,0.18); }
  .hdr-btn:active{ background: rgba(255,255,255,0.08); }
  .hdr-btn--primary{
    background: var(--clay);
    border-color: var(--clay);
  }
  .hdr-btn--primary:hover{ background: #D97435; }
  .eyebrow{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#C9D6BE; margin-bottom:6px; font-weight:600; }
  h1{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; margin:0 0 16px 0; letter-spacing:-0.01em; }

  .progress-wrap{ display:flex; align-items:center; gap:14px; }
  .progress-track{ flex:1; height:10px; background:rgba(255,255,255,0.15); border-radius:6px; overflow:hidden; }
  .progress-fill{ height:100%; background:linear-gradient(90deg,var(--clay),#E08B4C); width:0%; transition:width .35s ease; border-radius:6px; }
  .progress-label{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; white-space:nowrap; min-width:64px; text-align:right; }

  main{ max-width:640px; margin:0 auto; padding:18px 16px 0; position:relative; z-index:1; }

  /* ── category card ── */
  .category{
    background: var(--canvas-card);
    border: 1px solid var(--line);
    border-left: 5px solid var(--accent, var(--forest));
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .category.edit-active{
    border-color: var(--accent, var(--forest));
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent, var(--forest)) 20%, transparent);
  }

  .category-head{
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 12px 12px 16px;
    user-select:none;
  }
  .category-head-left{ display:flex; align-items:center; gap:10px; cursor:pointer; flex:1; }
  .cat-icon{ font-size:19px; line-height:1; }
  .cat-title{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; color:var(--ink); }
  .cat-count{ font-size:12.5px; color:var(--ink-soft); font-weight:500; }
  .chevron{ font-size:13px; color:var(--ink-soft); transition:transform .2s ease; }
  .category.collapsed .chevron{ transform:rotate(-90deg); }

  /* edit toggle btn */
  .edit-toggle{
    background: none; border: 1px solid var(--line);
    border-radius: 6px; padding: 5px 9px;
    font-size: 13px; cursor: pointer;
    color: var(--ink-soft);
    transition: all .15s ease;
    white-space:nowrap;
    margin-left:8px;
  }
  .edit-toggle:hover{ border-color: var(--accent, var(--forest)); color: var(--accent, var(--forest)); }
  .edit-active .edit-toggle{
    background: var(--accent, var(--forest));
    border-color: var(--accent, var(--forest));
    color: white;
  }

  /* ── items area ── */
  .items{ padding:0 12px 10px; display:grid; gap:2px; }
  .category.collapsed .items{ display:none; }

  /* normal item */
  .item{
    display:flex; align-items:center; gap:10px;
    padding: 7px 4px; border-radius:6px;
  }
  .item:not(.edit-item):active{ background:rgba(44,62,45,0.05); }

  .item input[type="checkbox"]{
    appearance:none; -webkit-appearance:none;
    width:21px; height:21px; min-width:21px;
    border:2px solid #B7AC8E; border-radius:50%;
    cursor:pointer; position:relative; background:#fff;
    transition:all .15s ease; flex-shrink:0;
  }
  .item input[type="checkbox"]:checked{ background:var(--forest); border-color:var(--forest); }
  .item input[type="checkbox"]:checked::after{
    content:""; position:absolute; left:6px; top:2px;
    width:5px; height:10px; border:solid white;
    border-width:0 2px 2px 0; transform:rotate(40deg);
  }
  .item label{ font-size:15px; color:var(--ink); flex:1; cursor:pointer; line-height:1.35; }
  .item.checked label{ color:var(--ink-soft); text-decoration:line-through; text-decoration-color:#B7AC8E; }

  /* category title edit */
  .cat-title-edit-row{
    display:flex; align-items:center; gap:8px;
    padding: 4px 12px 10px;
    border-bottom: 1px dashed var(--line);
    margin-bottom: 6px;
  }
  .cat-title-edit-label{
    font-size:11px; font-weight:600; letter-spacing:.08em;
    text-transform:uppercase; color:var(--ink-soft);
    white-space:nowrap;
  }
  .cat-title-edit{
    flex:1; font-family:'Space Grotesk',sans-serif; font-weight:700;
    font-size:15px; color:var(--ink);
    border:none; border-bottom:2px solid var(--accent, var(--forest));
    background:transparent; padding:4px 6px; border-radius:3px 3px 0 0;
    min-width:0;
  }
  .cat-title-edit:focus{ outline:none; background:#fff; }

  /* edit-mode item */
  .edit-item{
    background: rgba(0,0,0,0.02);
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 6px 8px;
    gap: 8px;
  }

  .drag-handle{
    color:#C4B89A; font-size:14px; cursor:grab;
    line-height:1; user-select:none; flex-shrink:0;
  }
  .drag-handle:active{ cursor:grabbing; }

  .item-label-edit{
    flex:1; font-size:14px; font-family:'Inter',sans-serif;
    color:var(--ink); background:transparent;
    border:none; border-bottom:1px solid transparent;
    padding:2px 4px; border-radius:3px;
    transition:border-color .15s;
  }
  .item-label-edit:focus{
    outline:none; background:#fff;
    border-bottom-color: var(--accent, var(--forest));
  }

  .del-btn{
    background:none; border:none;
    color:#C4B89A; font-size:16px;
    cursor:pointer; padding:2px 4px;
    border-radius:4px; line-height:1;
    transition:color .15s;
    flex-shrink:0;
  }
  .del-btn:hover{ color: var(--danger); }

  /* add row */
  .add-row{
    display:flex; gap:8px;
    padding:8px 4px 4px;
    border-top:1px dashed var(--line);
    margin-top:4px;
  }
  .add-row input[type="text"]{
    flex:1; border:1px dashed var(--line); border-radius:6px;
    padding:8px 10px; font-family:'Inter',sans-serif;
    font-size:14px; background:transparent; color:var(--ink);
  }
  .add-row input[type="text"]:focus{ outline:none; border-color:var(--accent,var(--forest)); background:#fff; }
  .add-row button{
    border:none; background:var(--accent,var(--forest)); color:white;
    font-weight:600; font-size:13px; border-radius:6px;
    padding:0 14px; cursor:pointer; white-space:nowrap;
  }

  .sync-status{
    margin-top: 10px;
    font-size: 11.5px; font-weight:600; letter-spacing:.04em;
    min-height: 16px; transition: opacity .3s;
    display:flex; align-items:center; gap:5px;
  }
  .sync-status.syncing { color: #C9D6BE; }
  .sync-status.ok      { color: #7EC87E; }
  .sync-status.err     { color: #F4947A; }
  .sync-status.local   { color: rgba(255,255,255,0.35); }

  footer{
    max-width:640px; margin:10px auto 0; padding:6px 16px 24px;
    display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
    position:relative; z-index:1;
  }
  .reset-btn{
    background:none; border:1px solid var(--line); color:var(--ink-soft);
    font-size:12.5px; padding:8px 14px; border-radius:20px; cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .reset-btn:active{ background:rgba(0,0,0,0.04); }
</style>
</head>
<body>

<div class="topo"></div>

<header>
  <div class="header-top">
    <div>
      <div class="eyebrow">Camping · 1ª semana de julio</div>
      <h1>Lista de equipaje</h1>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" id="resetBtn">✕ Desmarcar</button>
      <button class="hdr-btn" id="exportBtn">⬇ Exportar</button>
      <label class="hdr-btn hdr-btn--primary" id="importLabel">⬆ Importar<input type="file" id="importFile" accept=".json" style="display:none"></label>

<script>
const STORAGE_KEY = 'camping-julio-2026-v2';

const DEFAULT_CATEGORIES = [
  { id:'tienda',       icon:'⛺',  title:'Tienda y acampada',          accent:'#2C3E2D',
    items:['Tienda de campaña (cuerpo + doble techo)','Piquetas (+ repuesto)','Mazo','Vientos / cuerdas extra','Esterillas / aislante de suelo','Manta térmica para el suelo','Martillo o piedra para piquetas duras'] },

    items:['Toldo / avancé','Postes y piquetas del toldo','Mesa plegable','Sillas plegables','Esterilla para el suelo del toldo','Cuerda de tender'] },

    items:['Hornillo de camping','Bombona / cartucho de gas','Mechero o cerillas','Menaje (platos, vasos, cubiertos)','Ollas y sartén','Nevera portátil + placas frío','Garrafa de agua','Trapos y estropajo','Jabón lavavajillas','Bolsas de basura','Abrelatas / sacacorchos','Tabla de cortar y cuchillo'] },
  { id:'electricidad', icon:'🔌',  title:'Electricidad e iluminación',  accent:'#3E6E73',
    items:['Alargador eléctrico (varios metros)','Regleta / ladrón de enchufes','Bombillas de repuesto','Linterna frontal','Linterna de farol para el toldo','Pilas de repuesto','Power bank','Cargadores de móvil'] },
  { id:'descanso',     icon:'🛌',  title:'Sacos de dormir y descanso',  accent:'#6B5B95',
    items:['Sacos de dormir','Almohadas','Sábana bajera / saco sábana','Manta extra (por si refresca de noche)','Tapones para los oídos / antifaz'] },
  { id:'playa',        icon:'🌊',  title:'Cosas de playa',              accent:'#2E86AB',
    items:['Toallas de playa','Bañadores','Sombrilla','Crema solar','Neopreno / camiseta de baño','Juegos de playa (palas, pelota)','Chanclas','Bolsa para ropa mojada'] },
  { id:'higiene',      icon:'🧴',  title:'Higiene y baño',              accent:'#8A7355',
    items:['Neceser (jabón, gel, champú)','Toalla de ducha','Papel higiénico','Chanclas de ducha','Cepillo y pasta de dientes','Toallitas húmedas'] },
  { id:'ropa',         icon:'👕',  title:'Ropa y calzado',              accent:'#4A6741',
    items:['Ropa para varios días','Ropa de abrigo ligera para la noche','Chubasquero','Calzado cómodo / zapatillas','Gorra o sombrero'] },
  { id:'varios',       icon:'📋',  title:'Varios y documentación',      accent:'#A84448',
    items:['DNI / documentación','Reserva del camping','Botiquín básico','Repelente de mosquitos','Dinero en efectivo','Bolsas de basura extra','Cinta americana (siempre útil)'] }
];

// ── Runtime state ──
let customItems  = {};   // { catId: ['item', ...] }
let customTitles = {};   // { catId: 'Título personalizado' }
let checks = {};         // { 'catId:i': true }
let editMode = {};       // { catId: true } 
let collapsed = {};      // { catId: true }

// ══════════════════════════════════════════════════════════════════════════
// CONFIGURACIÓN — solo Iván toca estas dos líneas
// Paso 1: deja ENCRYPTED_CONFIG = '' y abre la página → aparece el Setup
// Paso 2: introduce token + Gist ID → copia la cadena generada aquí abajo
// Paso 3: sube a GitHub → nadie ve el token en claro
const PASSPHRASE      = 'camping-lista-2026';      // clave de cifrado (puedes cambiarla)
const ENCRYPTED_CONFIG = 'sXMo7TrpdJZDFt113mvidUVL0JhqnLkWa4xfZna6TOkWr8GrbsNb4M9LKSdjmZC+j5oVNlp5V3uUS9w1b8TGKDxpe8oKpFt7Mc8J+cjFk7iaA3arjfEdXOqQ8IrN9YT0SzDLHD4jJyHtU/uWuNnCCu5jKQ2NnqBpA9DcAg==';                        // pega aquí la cadena del Setup
// ══════════════════════════════════════════════════════════════════════════

const GIST_FILENAME = 'camping-julio-2026.json';

// ── WebCrypto AES-GCM ─────────────────────────────────────────────────────
async function _deriveKey(passphrase){
  const enc = new TextEncoder();
  const raw = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: enc.encode('gist-salt-v1'), iterations:100000, hash:'SHA-256' },
    raw, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function aesEncrypt(plaintext, passphrase){
  const key = await _deriveKey(passphrase);
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct  = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(plaintext));
  const buf = new Uint8Array(12 + ct.byteLength);
  buf.set(iv); buf.set(new Uint8Array(ct), 12);
  return btoa(String.fromCharCode(...buf));
}
async function aesDecrypt(b64, passphrase){
  const key = await _deriveKey(passphrase);
  const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const dec = await crypto.subtle.decrypt({ name:'AES-GCM', iv: buf.slice(0,12) }, key, buf.slice(12));
  return new TextDecoder().decode(dec);
}

// ── Obtener credenciales (descifrado automático al arrancar) ──────────────
let _cachedCreds = null;
async function getCreds(){
  if(_cachedCreds) return _cachedCreds;
  if(!ENCRYPTED_CONFIG) return null;
  try{
    const plain = await aesDecrypt(ENCRYPTED_CONFIG, PASSPHRASE);
    _cachedCreds = JSON.parse(plain);
    return _cachedCreds;
  }catch(e){ return null; }
}
const gistConfigured = async () => { const c = await getCreds(); return !!(c?.token && c?.gistId); };

// ── Pantalla de Setup (solo visible si ENCRYPTED_CONFIG está vacío) ───────
function showSetupScreen(){
  const main = document.getElementById('main');
  const lbl = 'display:block;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6B6256;margin-bottom:5px;';
  const inp = 'width:100%;border:1px solid #DCD0B6;border-radius:6px;padding:9px 11px;font-family:Inter,sans-serif;font-size:14px;margin-bottom:14px;box-sizing:border-box;';
  main.innerHTML = `
    <div style="background:#FBF7EE;border:1px solid #DCD0B6;border-left:5px solid #C7642C;
                border-radius:8px;padding:24px 20px;margin-top:4px;">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;margin-bottom:4px;">
        🔐 Setup de sincronización
      </div>
      <div style="font-size:13px;color:#6B6256;margin-bottom:20px;line-height:1.6;">
        Introduce el token y el Gist ID. El resultado es una cadena cifrada con AES-256
        que pegarás en el código — el token nunca queda en texto claro en GitHub.
      </div>

      <label style="${lbl}">GitHub Personal Access Token (scope: gist)</label>
      <input id="cfgToken" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style="${inp}">

      <label style="${lbl}">Gist ID</label>
      <input id="cfgGistId" type="text" placeholder="32 caracteres hex" style="${inp}">

      <button id="cfgGen"
        style="background:#2C3E2D;color:white;border:none;border-radius:6px;
               padding:10px 20px;font-weight:600;font-size:14px;cursor:pointer;margin-bottom:16px;">
        Generar cadena cifrada
      </button>

      <div id="cfgResult" style="display:none;">
        <div style="font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
                    color:#6B6256;margin-bottom:6px;">
          Copia esta cadena y pégala en <code>ENCRYPTED_CONFIG</code> del HTML:
        </div>
        <textarea id="cfgOutput" readonly rows="3"
          style="width:100%;border:1px solid #DCD0B6;border-radius:6px;padding:9px 11px;
                 font-family:monospace;font-size:12px;resize:vertical;box-sizing:border-box;
                 background:#fff;color:#2B2620;"></textarea>
        <button id="cfgCopy"
          style="margin-top:8px;background:none;border:1px solid #2C3E2D;border-radius:6px;
                 padding:7px 14px;font-size:13px;color:#2C3E2D;cursor:pointer;">
          📋 Copiar
        </button>
      </div>
      <div id="cfgStatus" style="margin-top:10px;font-size:13px;min-height:18px;"></div>
    </div>
  `;

  document.getElementById('cfgGen').addEventListener('click', async ()=>{
    const token  = document.getElementById('cfgToken').value.trim();
    const gistId = document.getElementById('cfgGistId').value.trim();
    const st     = document.getElementById('cfgStatus');
    if(!token || !gistId){ st.style.color='#B03030'; st.textContent='⚠️ Rellena los dos campos.'; return; }
    st.style.color='#6B6256'; st.textContent='⟳ Verificando conexión con GitHub…';
    try{
      const r = await fetch(`https://api.github.com/gists/${gistId}`,{
        headers:{ 'Authorization':`token ${token}`, 'Accept':'application/vnd.github+json' }
      });
      if(!r.ok) throw new Error('HTTP '+r.status);
      const encrypted = await aesEncrypt(JSON.stringify({ token, gistId }), PASSPHRASE);
      document.getElementById('cfgOutput').value = encrypted;
      document.getElementById('cfgResult').style.display = 'block';
      st.style.color='#2C7A2C'; st.textContent='✓ Conexión correcta. Copia la cadena al código.';
    }catch(e){
      st.style.color='#B03030'; st.textContent='✕ Error de conexión. Revisa el token y el Gist ID.';
    }
  });

  document.getElementById('cfgCopy')?.addEventListener('click', ()=>{
    const out = document.getElementById('cfgOutput');
    out.select(); document.execCommand('copy');
    document.getElementById('cfgCopy').textContent = '✓ Copiado';
  });
}
// ─────────────────────────────────────────────────────────────────────────

// ── Sync status indicator ──
function setSync(state, msg){
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + state;
  const icons = { syncing:'⟳', ok:'✓', err:'✕', local:'○', '':'' };
  el.textContent = (icons[state]||'') + (msg ? ' '+msg : '');
}

// ── Debounce ──
let saveTimer = null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=> save(), 1200);
}

// ── Persistence ──
async function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const d = JSON.parse(raw);
      customItems  = d.customItems  || {};
      customTitles = d.customTitles || {};
      checks       = d.checks       || {};
    }
  }catch(e){}

  if(!ENCRYPTED_CONFIG){ setSync('local', 'Setup pendiente'); return; }

  const creds = await getCreds();
  if(!creds){ setSync('err', 'Error al descifrar config'); return; }

  setSync('syncing', 'Cargando desde Gist…');
  try{
    const r = await fetch(`https://api.github.com/gists/${creds.gistId}`, {
      headers:{ 'Authorization':`token ${creds.token}`, 'Accept':'application/vnd.github+json' }
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    const content = data.files?.[GIST_FILENAME]?.content;
    if(content){
      const d = JSON.parse(content);
      customItems  = d.customItems  || {};
      customTitles = d.customTitles || {};
      checks       = d.checks       || {};
      localStorage.setItem(STORAGE_KEY, content);
    }
    const ts = data.updated_at
      ? new Date(data.updated_at).toLocaleString('es-ES',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
      : '';
    setSync('ok', 'Sincronizado' + (ts ? ' · '+ts : ''));
  }catch(e){
    setSync('err', 'Sin conexión · datos locales');
    console.warn('Gist load error:', e);
  }
}

async function save(){
  const payload = JSON.stringify({ customItems, customTitles, checks }, null, 2);
  try{ localStorage.setItem(STORAGE_KEY, payload); }catch(e){}

  if(!ENCRYPTED_CONFIG) return;
  const creds = await getCreds();
  if(!creds) return;

  setSync('syncing', 'Guardando…');
  try{
    const r = await fetch(`https://api.github.com/gists/${creds.gistId}`, {
      method:'PATCH',
      headers:{
        'Authorization':`token ${creds.token}`,
        'Accept':'application/vnd.github+json',
        'Content-Type':'application/json'
      },
      body: JSON.stringify({ files:{ [GIST_FILENAME]:{ content: payload } } })
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const ts = new Date().toLocaleString('es-ES',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    setSync('ok', 'Guardado · '+ts);
  }catch(e){
    setSync('err', 'Error al guardar · cambios en local');
    console.error('Gist save error:', e);
  }
}

// ── Helpers ──
function getItems(catId){
  return customItems[catId] !== undefined
    ? customItems[catId]
    : DEFAULT_CATEGORIES.find(c=>c.id===catId).items.slice();
}

function getTitle(catId){
  return customTitles[catId] !== undefined
    ? customTitles[catId]
    : DEFAULT_CATEGORIES.find(c=>c.id===catId).title;
}

function setTitle(catId, val){
  const def = DEFAULT_CATEGORIES.find(c=>c.id===catId).title;
  customTitles[catId] = val.trim() || def;
}

function setItems(catId, arr){
  // Re-map checks: build fresh check map by text so we don't lose state after reorder/delete
  const oldItems = getItems(catId);
  const oldChecks = {};
  oldItems.forEach((txt,i)=>{ if(checks[catId+':'+i]) oldChecks[txt]=true; });
  customItems[catId] = arr;
  // Clear old keys for this cat
  Object.keys(checks).filter(k=>k.startsWith(catId+':')).forEach(k=>delete checks[k]);
  arr.forEach((txt,i)=>{ if(oldChecks[txt]) checks[catId+':'+i]=true; });
}

function allKeys(){
  const keys=[];
  DEFAULT_CATEGORIES.forEach(c=>getItems(c.id).forEach((_,i)=>keys.push(c.id+':'+i)));
  return keys;
}

// ── Rendering ──
function render(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  DEFAULT_CATEGORIES.forEach(cat => {
    const items = getItems(cat.id);
    const checkedCount = items.filter((_,i)=>!!checks[cat.id+':'+i]).length;
    const isEdit = !!editMode[cat.id];
    const isCollapsed = !!collapsed[cat.id];

    const card = document.createElement('div');
    card.className = 'category' + (isEdit?' edit-active':'') + (isCollapsed?' collapsed':'');
    card.style.setProperty('--accent', cat.accent);
    card.dataset.catId = cat.id;

    // ── Header ──
    const head = document.createElement('div');
    head.className = 'category-head';
    const displayTitle = getTitle(cat.id);
    head.innerHTML = `
      <div class="category-head-left">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-title">${displayTitle}</span>
        <span class="cat-count" data-countfor="${cat.id}">${checkedCount}/${items.length}</span>
        <span class="chevron">▼</span>
      </div>
      <button class="edit-toggle" data-editcat="${cat.id}">${isEdit ? '✓ Listo' : '✏️ Editar'}</button>
    `;
    head.querySelector('.category-head-left').addEventListener('click', ()=>{
      collapsed[cat.id] = !collapsed[cat.id];
      render();
    });
    head.querySelector('.edit-toggle').addEventListener('click', e=>{
      e.stopPropagation();
      editMode[cat.id] = !editMode[cat.id];
      if(editMode[cat.id]) collapsed[cat.id] = false;
      render();
    });
    card.appendChild(head);

    // ── Items container ──
    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'items';

    if(isEdit){
      // ── Category title edit row ──
      const titleRow = document.createElement('div');
      titleRow.className = 'cat-title-edit-row';
      const titleLabel = document.createElement('span');
      titleLabel.className = 'cat-title-edit-label';
      titleLabel.textContent = 'Categoría';
      const titleInput = document.createElement('input');
      titleInput.type = 'text';
      titleInput.className = 'cat-title-edit';
      titleInput.value = getTitle(cat.id);
      titleInput.placeholder = DEFAULT_CATEGORIES.find(c=>c.id===cat.id).title;
      titleInput.addEventListener('change', ()=>{
        setTitle(cat.id, titleInput.value);
        scheduleSave();
        head.querySelector('.cat-title').textContent = getTitle(cat.id);
      });
      titleInput.addEventListener('keydown', e=>{ if(e.key==='Enter') titleInput.blur(); });
      titleRow.appendChild(titleLabel);
      titleRow.appendChild(titleInput);
      itemsDiv.appendChild(titleRow);
      items.forEach((txt, i)=>{
        const row = document.createElement('div');
        row.className = 'item edit-item';
        row.draggable = true;
        row.dataset.idx = i;

        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '⠿';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'item-label-edit';
        input.value = txt;
        input.placeholder = 'Nombre del artículo';
        input.addEventListener('change', ()=>{
          const arr = getItems(cat.id);
          arr[i] = input.value.trim() || txt;
          setItems(cat.id, arr);
          scheduleSave();
          updateCountAndProgress();
        });
        input.addEventListener('keydown', e=>{ if(e.key==='Enter') input.blur(); });

        const del = document.createElement('button');
        del.className = 'del-btn';
        del.title = 'Eliminar';
        del.innerHTML = '🗑️';
        del.addEventListener('click', ()=>{
          const arr = getItems(cat.id);
          arr.splice(i, 1);
          setItems(cat.id, arr);
          scheduleSave();
          render();
        });

        row.appendChild(handle);
        row.appendChild(input);
        row.appendChild(del);
        itemsDiv.appendChild(row);
      });

      // ── Drag-and-drop reorder ──
      let dragSrc = null;
      itemsDiv.querySelectorAll('.edit-item').forEach(row=>{
        row.addEventListener('dragstart', e=>{ dragSrc=row; e.dataTransfer.effectAllowed='move'; });
        row.addEventListener('dragover',  e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; row.style.opacity='.5'; });
        row.addEventListener('dragleave', ()=>{ row.style.opacity=''; });
        row.addEventListener('drop', e=>{
          e.preventDefault();
          row.style.opacity='';
          if(dragSrc===row) return;
          const fromIdx = parseInt(dragSrc.dataset.idx);
          const toIdx   = parseInt(row.dataset.idx);
          const arr = getItems(cat.id);
          const [moved] = arr.splice(fromIdx,1);
          arr.splice(toIdx,0,moved);
          setItems(cat.id, arr);
          scheduleSave();
          render();
        });
        row.addEventListener('dragend', ()=>{ itemsDiv.querySelectorAll('.edit-item').forEach(r=>r.style.opacity=''); });
      });

      // ── Add new item row ──
      const addRow = document.createElement('div');
      addRow.className = 'add-row';
      const addInput = document.createElement('input');
      addInput.type = 'text';
      addInput.placeholder = 'Nuevo artículo…';
      const addBtn = document.createElement('button');
      addBtn.textContent = '+ Añadir';
      const doAdd = ()=>{
        const val = addInput.value.trim();
        if(!val) return;
        const arr = getItems(cat.id);
        arr.push(val);
        setItems(cat.id, arr);
        scheduleSave();
        addInput.value = '';
        render();
        // re-focus add input after render
        setTimeout(()=>{
          const el = document.querySelector(`[data-catId="${cat.id}"] .add-row input`);
          if(el){ el.focus(); editMode[cat.id]=true; }
        }, 50);
      };
      addBtn.addEventListener('click', doAdd);
      addInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doAdd(); });
      addRow.appendChild(addInput);
      addRow.appendChild(addBtn);
      itemsDiv.appendChild(addRow);

    } else {
      // NORMAL MODE: checkboxes
      items.forEach((txt, i)=>{
        const key = cat.id+':'+i;
        const checked = !!checks[key];
        const row = document.createElement('div');
        row.className = 'item' + (checked?' checked':'');
        const cbId = 'cb-'+cat.id+'-'+i;
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = cbId;
        cb.checked = checked;
        const lbl = document.createElement('label');
        lbl.htmlFor = cbId;
        lbl.textContent = txt;
        cb.addEventListener('change', ()=>{
          checks[key] = cb.checked;
          row.classList.toggle('checked', cb.checked);
          scheduleSave();
          updateCountAndProgress();
          card.querySelector(`[data-countfor="${cat.id}"]`).textContent =
            getItems(cat.id).filter((_,j)=>!!checks[cat.id+':'+j]).length + '/' + getItems(cat.id).length;
        });
        row.appendChild(cb);
        row.appendChild(lbl);
        itemsDiv.appendChild(row);
      });
    }

    card.appendChild(itemsDiv);
    card.dataset.catId = cat.id;
    main.appendChild(card);
  });

  updateCountAndProgress();
}

function updateCountAndProgress(){
  const keys = allKeys();
  const total = keys.length;
  const done  = keys.filter(k=>checks[k]).length;
  const pct   = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
  DEFAULT_CATEGORIES.forEach(c=>{
    const el = document.querySelector(`[data-countfor="${c.id}"]`);
    if(el){
      const items=getItems(c.id);
      el.textContent = items.filter((_,i)=>!!checks[c.id+':'+i]).length+'/'+items.length;
    }
  });
}

document.getElementById('resetBtn').addEventListener('click', async ()=>{
  checks = {};
  await save();
  render();
});

document.getElementById('exportBtn').addEventListener('click', ()=>{
  const data = JSON.stringify({ customItems, customTitles, checks }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'camping-julio-2026.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('importFile').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const d    = JSON.parse(text);
    customItems  = d.customItems  || {};
    customTitles = d.customTitles || {};
    checks       = d.checks       || {};
    await save();
    render();
  }catch(err){
    alert('El archivo no es válido o está corrupto.');
  }
  // reset input so the same file can be re-imported if needed
  e.target.value = '';
});

(async function init(){
  if(!ENCRYPTED_CONFIG){
    render();           // renderiza categorías vacías con barra de progreso
    showSetupScreen();  // superpone panel de setup en main
    return;
  }
  await load();
  render();
})();
</script>
</body>
