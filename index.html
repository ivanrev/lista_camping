<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camping · Mis listas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --forest: #2C3E2D;
    --forest-deep: #1E2B1F;
    --canvas: #F2EAD8;
    --canvas-card: #FBF7EE;
    --clay: #C7642C;
    --ochre: #B98A2E;
    --sky: #3E6E73;
    --ink: #2B2620;
    --ink-soft: #6B6256;
    --line: #DCD0B6;
    --danger: #B03030;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background-color: var(--canvas);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(44,62,45,0.05) 0, transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(199,100,44,0.06) 0, transparent 45%);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  .topo{
    position: fixed; inset: 0; z-index: 0;
    opacity: 0.05; pointer-events: none;
    background-image: repeating-radial-gradient(circle at 50% 0%, transparent 0, transparent 38px, var(--forest) 39px, transparent 40px);
    background-size: 600px 600px;
  }

  /* ── sidebar ── */
  .sidebar-overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.45);
    z-index:50; opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .sidebar-overlay.open{ opacity:1; pointer-events:auto; }

  .sidebar{
    position:fixed; top:0; left:0; height:100%;
    width:300px; max-width:85vw;
    background:var(--canvas-card);
    z-index:60;
    transform:translateX(-100%);
    transition:transform .25s ease;
    box-shadow:2px 0 20px rgba(0,0,0,0.25);
    display:flex; flex-direction:column;
  }
  .sidebar.open{ transform:translateX(0); }

  .sidebar-head{
    background: linear-gradient(180deg, var(--forest) 0%, var(--forest-deep) 100%);
    color:var(--canvas);
    padding:18px 16px;
    display:flex; align-items:center; justify-content:space-between;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px;
    border-bottom:3px solid var(--clay);
    flex-shrink:0;
  }
  .sidebar-close{
    background:none; border:none; color:var(--canvas);
    font-size:18px; cursor:pointer; padding:2px 6px; line-height:1;
  }

  .sidebar-list{ flex:1; overflow-y:auto; padding:10px; }

  .sidebar-item{
    display:flex; align-items:center; justify-content:space-between;
    gap:8px; padding:10px 10px; border-radius:8px;
    margin-bottom:4px; cursor:default;
    border:1px solid transparent;
  }
  .sidebar-item.active{
    background: rgba(44,62,45,0.08);
    border-color: var(--forest);
  }
  .sidebar-item-main{ flex:1; min-width:0; cursor:pointer; }
  .sidebar-item-name{
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14.5px;
    color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .sidebar-item-meta{ font-size:12px; color:var(--ink-soft); margin-top:2px; }
  .sidebar-item-actions{ display:flex; gap:2px; flex-shrink:0; }
  .sidebar-item-btn{
    background:none; border:none; font-size:14px; cursor:pointer;
    padding:4px 6px; border-radius:5px; color:var(--ink-soft);
  }
  .sidebar-item-btn:hover{ background:rgba(0,0,0,0.06); }

  .sidebar-item-input, .sidebar-item-date{
    width:100%; border:1px solid var(--line); border-radius:6px;
    padding:7px 9px; font-family:'Inter',sans-serif; font-size:13.5px;
    margin-bottom:6px; background:#fff; color:var(--ink);
  }
  .sidebar-item-edit-actions{ display:flex; gap:6px; margin-top:2px; }
  .sidebar-item-save, .sidebar-item-cancel{
    border:none; border-radius:6px; padding:6px 12px;
    font-size:12.5px; font-weight:600; cursor:pointer;
  }
  .sidebar-item-save{ background:var(--forest); color:#fff; }
  .sidebar-item-cancel{ background:none; border:1px solid var(--line); color:var(--ink-soft); }

  .sidebar-foot{ padding:10px; border-top:1px dashed var(--line); flex-shrink:0; }
  .sidebar-add-btn{
    width:100%; background:none; border:1px dashed var(--line);
    color:var(--ink-soft); border-radius:8px; padding:11px;
    font-size:13.5px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .sidebar-add-form{ background:rgba(0,0,0,0.02); border-radius:8px; padding:10px; }

  /* ── header ── */
  header{
    background: linear-gradient(180deg, var(--forest) 0%, var(--forest-deep) 100%);
    color: var(--canvas);
    padding: 20px 20px 18px;
    position: relative; z-index: 1;
    border-bottom: 3px solid var(--clay);
  }
  .header-top{
    display:flex; align-items:flex-start;
    justify-content:space-between; gap:12px;
    margin-bottom:14px;
  }
  .header-top-left{ display:flex; align-items:flex-start; gap:10px; min-width:0; }
  .menu-btn{
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--canvas);
    font-size:16px; line-height:1; cursor:pointer;
    border-radius:8px; padding:7px 10px; flex-shrink:0;
  }
  .menu-btn:hover{ background: rgba(255,255,255,0.18); }
  .header-actions{
    display:flex; flex-direction:column; gap:7px;
    align-items:flex-end; flex-shrink:0;
  }
  .hdr-btn{
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.25);
    color: var(--canvas);
    font-family:'Inter',sans-serif;
    font-size:12px; font-weight:600;
    padding: 6px 12px; border-radius:20px;
    cursor:pointer; white-space:nowrap;
    transition: background .15s;
    letter-spacing:.02em;
  }
  .hdr-btn:hover{ background: rgba(255,255,255,0.18); }
  .hdr-btn:active{ background: rgba(255,255,255,0.08); }
  .hdr-btn--primary{
    background: var(--clay);
    border-color: var(--clay);
  }
  .hdr-btn--primary:hover{ background: #D97435; }
  .eyebrow{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:#C9D6BE; margin-bottom:6px; font-weight:600; }
  h1{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:26px; margin:0 0 16px 0; letter-spacing:-0.01em; overflow:hidden; text-overflow:ellipsis; }

  .progress-wrap{ display:flex; align-items:center; gap:14px; }
  .progress-track{ flex:1; height:10px; background:rgba(255,255,255,0.15); border-radius:6px; overflow:hidden; }
  .progress-fill{ height:100%; background:linear-gradient(90deg,var(--clay),#E08B4C); width:0%; transition:width .35s ease; border-radius:6px; }
  .progress-label{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:15px; white-space:nowrap; min-width:64px; text-align:right; }

  main{ max-width:640px; margin:0 auto; padding:18px 16px 0; position:relative; z-index:1; }

  /* ── category card ── */
  .category{
    background: var(--canvas-card);
    border: 1px solid var(--line);
    border-left: 5px solid var(--accent, var(--forest));
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .category.edit-active{
    border-color: var(--accent, var(--forest));
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent, var(--forest)) 20%, transparent);
  }

  .category-head{
    display:flex; align-items:center; justify-content:space-between;
    padding: 12px 12px 12px 16px;
    user-select:none;
  }
  .category-head-left{ display:flex; align-items:center; gap:10px; cursor:pointer; flex:1; }
  .cat-icon{ font-size:19px; line-height:1; }
  .cat-title{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; color:var(--ink); }
  .cat-count{ font-size:12.5px; color:var(--ink-soft); font-weight:500; }
  .chevron{ font-size:13px; color:var(--ink-soft); transition:transform .2s ease; }
  .category.collapsed .chevron{ transform:rotate(-90deg); }

  /* edit toggle btn */
  .edit-toggle{
    background: none; border: 1px solid var(--line);
    border-radius: 6px; padding: 5px 9px;
    font-size: 13px; cursor: pointer;
    color: var(--ink-soft);
    transition: all .15s ease;
    white-space:nowrap;
    margin-left:8px;
  }
  .edit-toggle:hover{ border-color: var(--accent, var(--forest)); color: var(--accent, var(--forest)); }
  .edit-active .edit-toggle{
    background: var(--accent, var(--forest));
    border-color: var(--accent, var(--forest));
    color: white;
  }

  /* ── items area ── */
  .items{ padding:0 12px 10px; display:grid; gap:2px; }
  .category.collapsed .items{ display:none; }

  /* normal item */
  .item{
    display:flex; align-items:center; gap:10px;
    padding: 7px 4px; border-radius:6px;
  }
  .item:not(.edit-item):active{ background:rgba(44,62,45,0.05); }

  .item input[type="checkbox"]{
    appearance:none; -webkit-appearance:none;
    width:21px; height:21px; min-width:21px;
    border:2px solid #B7AC8E; border-radius:50%;
    cursor:pointer; position:relative; background:#fff;
    transition:all .15s ease; flex-shrink:0;
  }
  .item input[type="checkbox"]:checked{ background:var(--forest); border-color:var(--forest); }
  .item input[type="checkbox"]:checked::after{
    content:""; position:absolute; left:6px; top:2px;
    width:5px; height:10px; border:solid white;
    border-width:0 2px 2px 0; transform:rotate(40deg);
  }
  .item label{ font-size:15px; color:var(--ink); flex:1; cursor:pointer; line-height:1.35; }
  .item.checked label{ color:var(--ink-soft); text-decoration:line-through; text-decoration-color:#B7AC8E; }

  /* category title edit */
  .cat-title-edit-row{
    display:flex; align-items:center; gap:8px;
    padding: 4px 12px 10px;
    border-bottom: 1px dashed var(--line);
    margin-bottom: 6px;
  }
  .cat-title-edit-label{
    font-size:11px; font-weight:600; letter-spacing:.08em;
    text-transform:uppercase; color:var(--ink-soft);
    white-space:nowrap;
  }
  .cat-title-edit{
    flex:1; font-family:'Space Grotesk',sans-serif; font-weight:700;
    font-size:15px; color:var(--ink);
    border:none; border-bottom:2px solid var(--accent, var(--forest));
    background:transparent; padding:4px 6px; border-radius:3px 3px 0 0;
    min-width:0;
  }
  .cat-title-edit:focus{ outline:none; background:#fff; }

  /* edit-mode item */
  .edit-item{
    background: rgba(0,0,0,0.02);
    border: 1px solid var(--line);
    border-radius: 7px;
    padding: 6px 8px;
    gap: 8px;
  }

  .drag-handle{
    color:#C4B89A; font-size:14px; cursor:grab;
    line-height:1; user-select:none; flex-shrink:0;
  }
  .drag-handle:active{ cursor:grabbing; }

  .item-label-edit{
    flex:1; font-size:14px; font-family:'Inter',sans-serif;
    color:var(--ink); background:transparent;
    border:none; border-bottom:1px solid transparent;
    padding:2px 4px; border-radius:3px;
    transition:border-color .15s;
  }
  .item-label-edit:focus{
    outline:none; background:#fff;
    border-bottom-color: var(--accent, var(--forest));
  }

  .del-btn{
    background:none; border:none;
    color:#C4B89A; font-size:16px;
    cursor:pointer; padding:2px 4px;
    border-radius:4px; line-height:1;
    transition:color .15s;
    flex-shrink:0;
  }
  .del-btn:hover{ color: var(--danger); }

  /* add row */
  .add-row{
    display:flex; gap:8px;
    padding:8px 4px 4px;
    border-top:1px dashed var(--line);
    margin-top:4px;
  }
  .add-row input[type="text"]{
    flex:1; border:1px dashed var(--line); border-radius:6px;
    padding:8px 10px; font-family:'Inter',sans-serif;
    font-size:14px; background:transparent; color:var(--ink);
  }
  .add-row input[type="text"]:focus{ outline:none; border-color:var(--accent,var(--forest)); background:#fff; }
  .add-row button{
    border:none; background:var(--accent,var(--forest)); color:white;
    font-weight:600; font-size:13px; border-radius:6px;
    padding:0 14px; cursor:pointer; white-space:nowrap;
  }

  .sync-status{
    margin-top: 10px;
    font-size: 11.5px; font-weight:600; letter-spacing:.04em;
    min-height: 16px; transition: opacity .3s;
    display:flex; align-items:center; gap:5px;
  }
  .sync-status.syncing { color: #C9D6BE; }
  .sync-status.ok      { color: #7EC87E; }
  .sync-status.err     { color: #F4947A; }
  .sync-status.local   { color: rgba(255,255,255,0.35); }

  footer{
    max-width:640px; margin:10px auto 0; padding:6px 16px 24px;
    display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
    position:relative; z-index:1;
  }
  .reset-btn{
    background:none; border:1px solid var(--line); color:var(--ink-soft);
    font-size:12.5px; padding:8px 14px; border-radius:20px; cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .reset-btn:active{ background:rgba(0,0,0,0.04); }
</style>
</head>
<body>

<div class="topo"></div>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <span>📋 Mis listas</span>
    <button class="sidebar-close" id="sidebarClose">✕</button>
  </div>
  <div class="sidebar-list" id="sidebarList"></div>
  <div class="sidebar-foot" id="sidebarFoot"></div>
</nav>

<header>
  <div class="header-top">
    <div class="header-top-left">
      <button class="menu-btn" id="menuBtn" title="Mis listas">☰</button>
      <div>
        <div class="eyebrow" id="listEyebrow">Camping</div>
        <h1 id="listTitle">Lista de equipaje</h1>
      </div>
    </div>
    <div class="header-actions">
      <button class="hdr-btn" id="resetBtn">✕ Desmarcar</button>
      <button class="hdr-btn" id="exportBtn">⬇ Exportar</button>
      <label class="hdr-btn hdr-btn--primary" id="importLabel">⬆ Importar<input type="file" id="importFile" accept=".json" style="display:none"></label>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0 / 0</div>
  </div>
  <div class="sync-status" id="syncStatus"></div>
</header>

<main id="main"></main>

<footer></footer>

<script>
const STORAGE_KEY = 'camping-julio-2026-v2';

const DEFAULT_CATEGORIES = [
  { id:'tienda',       icon:'⛺',  title:'Tienda y acampada',          accent:'#2C3E2D',
    items:['Tienda de campaña (cuerpo + doble techo)','Piquetas (+ repuesto)','Mazo','Vientos / cuerdas extra','Esterillas / aislante de suelo','Manta térmica para el suelo','Martillo o piedra para piquetas duras'] },
  { id:'toldo',        icon:'🏕️', title:'Toldo y zona exterior',       accent:'#C7642C',
    items:['Toldo / avancé','Postes y piquetas del toldo','Mesa plegable','Sillas plegables','Esterilla para el suelo del toldo','Cuerda de tender'] },
  { id:'cocina',       icon:'🍳',  title:'Cocina y accesorios',         accent:'#B98A2E',
    items:['Hornillo de camping','Bombona / cartucho de gas','Mechero o cerillas','Menaje (platos, vasos, cubiertos)','Ollas y sartén','Nevera portátil + placas frío','Garrafa de agua','Trapos y estropajo','Jabón lavavajillas','Bolsas de basura','Abrelatas / sacacorchos','Tabla de cortar y cuchillo'] },
  { id:'electricidad', icon:'🔌',  title:'Electricidad e iluminación',  accent:'#3E6E73',
    items:['Alargador eléctrico (varios metros)','Regleta / ladrón de enchufes','Bombillas de repuesto','Linterna frontal','Linterna de farol para el toldo','Pilas de repuesto','Power bank','Cargadores de móvil'] },
  { id:'descanso',     icon:'🛌',  title:'Sacos de dormir y descanso',  accent:'#6B5B95',
    items:['Sacos de dormir','Almohadas','Sábana bajera / saco sábana','Manta extra (por si refresca de noche)','Tapones para los oídos / antifaz'] },
  { id:'playa',        icon:'🌊',  title:'Cosas de playa',              accent:'#2E86AB',
    items:['Toallas de playa','Bañadores','Sombrilla','Crema solar','Neopreno / camiseta de baño','Juegos de playa (palas, pelota)','Chanclas','Bolsa para ropa mojada'] },
  { id:'higiene',      icon:'🧴',  title:'Higiene y baño',              accent:'#8A7355',
    items:['Neceser (jabón, gel, champú)','Toalla de ducha','Papel higiénico','Chanclas de ducha','Cepillo y pasta de dientes','Toallitas húmedas'] },
  { id:'ropa',         icon:'👕',  title:'Ropa y calzado',              accent:'#4A6741',
    items:['Ropa para varios días','Ropa de abrigo ligera para la noche','Chubasquero','Calzado cómodo / zapatillas','Gorra o sombrero'] },
  { id:'varios',       icon:'📋',  title:'Varios y documentación',      accent:'#A84448',
    items:['DNI / documentación','Reserva del camping','Botiquín básico','Repelente de mosquitos','Dinero en efectivo','Bolsas de basura extra','Cinta americana (siempre útil)'] }
];

// ── Runtime state ──
// Cada lista: { id, name, date('YYYY-MM-DD'), categories:[{id,icon,title,accent,items:[]}], checks:{'catId:i':true} }
let lists = [];
let activeListId = null;
let editMode = {};        // { catId: true } — modo edición de categoría, sólo para la lista activa
let collapsed = {};       // { catId: true }
let addingCategory = false;
let addingList = false;
let editingListId = null;
let sidebarOpen = false;

// ══════════════════════════════════════════════════════════════════════════
// CONFIGURACIÓN — solo Iván toca estas dos líneas
// Paso 1: deja ENCRYPTED_CONFIG = '' y abre la página → aparece el Setup
// Paso 2: introduce token + Gist ID → copia la cadena generada aquí abajo
// Paso 3: sube a GitHub → nadie ve el token en claro
const PASSPHRASE      = 'camping-lista-2026';      // clave de cifrado (puedes cambiarla)
const ENCRYPTED_CONFIG = 'sXMo7TrpdJZDFt113mvidUVL0JhqnLkWa4xfZna6TOkWr8GrbsNb4M9LKSdjmZC+j5oVNlp5V3uUS9w1b8TGKDxpe8oKpFt7Mc8J+cjFk7iaA3arjfEdXOqQ8IrN9YT0SzDLHD4jJyHtU/uWuNnCCu5jKQ2NnqBpA9DcAg==';                        // pega aquí la cadena del Setup
// ══════════════════════════════════════════════════════════════════════════

const GIST_FILENAME = 'camping-julio-2026.json';

// ── WebCrypto AES-GCM ─────────────────────────────────────────────────────
async function _deriveKey(passphrase){
  const enc = new TextEncoder();
  const raw = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt: enc.encode('gist-salt-v1'), iterations:100000, hash:'SHA-256' },
    raw, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function aesEncrypt(plaintext, passphrase){
  const key = await _deriveKey(passphrase);
  const iv  = crypto.getRandomValues(new Uint8Array(12));
  const enc = new TextEncoder();
  const ct  = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc.encode(plaintext));
  const buf = new Uint8Array(12 + ct.byteLength);
  buf.set(iv); buf.set(new Uint8Array(ct), 12);
  return btoa(String.fromCharCode(...buf));
}
async function aesDecrypt(b64, passphrase){
  const key = await _deriveKey(passphrase);
  const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const dec = await crypto.subtle.decrypt({ name:'AES-GCM', iv: buf.slice(0,12) }, key, buf.slice(12));
  return new TextDecoder().decode(dec);
}

// ── Obtener credenciales (descifrado automático al arrancar) ──────────────
let _cachedCreds = null;
async function getCreds(){
  if(_cachedCreds) return _cachedCreds;
  if(!ENCRYPTED_CONFIG) return null;
  try{
    const plain = await aesDecrypt(ENCRYPTED_CONFIG, PASSPHRASE);
    _cachedCreds = JSON.parse(plain);
    return _cachedCreds;
  }catch(e){ return null; }
}
const gistConfigured = async () => { const c = await getCreds(); return !!(c?.token && c?.gistId); };

// ── Pantalla de Setup (solo visible si ENCRYPTED_CONFIG está vacío) ───────
function showSetupScreen(){
  const main = document.getElementById('main');
  const lbl = 'display:block;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:#6B6256;margin-bottom:5px;';
  const inp = 'width:100%;border:1px solid #DCD0B6;border-radius:6px;padding:9px 11px;font-family:Inter,sans-serif;font-size:14px;margin-bottom:14px;box-sizing:border-box;';
  main.innerHTML = `
    <div style="background:#FBF7EE;border:1px solid #DCD0B6;border-left:5px solid #C7642C;
                border-radius:8px;padding:24px 20px;margin-top:4px;">
      <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:17px;margin-bottom:4px;">
        🔐 Setup de sincronización
      </div>
      <div style="font-size:13px;color:#6B6256;margin-bottom:20px;line-height:1.6;">
        Introduce el token y el Gist ID. El resultado es una cadena cifrada con AES-256
        que pegarás en el código — el token nunca queda en texto claro en GitHub.
      </div>

      <label style="${lbl}">GitHub Personal Access Token (scope: gist)</label>
      <input id="cfgToken" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style="${inp}">

      <label style="${lbl}">Gist ID</label>
      <input id="cfgGistId" type="text" placeholder="32 caracteres hex" style="${inp}">

      <button id="cfgGen"

        </div>
        <textarea id="cfgOutput" readonly rows="3"
          style="width:100%;border:1px solid #DCD0B6;border-radius:6px;padding:9px 11px;
                 font-family:monospace;font-size:12px;resize:vertical;box-sizing:border-box;

        <button id="cfgCopy"
          style="margin-top:8px;background:none;border:1px solid #2C3E2D;border-radius:6px;

        </button>
      </div>
      <div id="cfgStatus" style="margin-top:10px;font-size:13px;min-height:18px;"></div>

  `;

  document.getElementById('cfgGen').addEventListener('click', async ()=>{

    const gistId = document.getElementById('cfgGistId').value.trim();

    st.style.color='#6B6256'; st.textContent='⟳ Verificando conexión con GitHub…';
    try{
      const r = await fetch(`https://api.github.com/gists/${gistId}`,{
        headers:{ 'Authorization':`token ${token}`, 'Accept':'application/vnd.github+json' }
      });
      if(!r.ok) throw new Error('HTTP '+r.status);
      const encrypted = await aesEncrypt(JSON.stringify({ token, gistId }), PASSPHRASE);
      document.getElementById('cfgOutput').value = encrypted;
      document.getElementById('cfgResult').style.display = 'block';
      st.style.color='#2C7A2C'; st.textContent='✓ Conexión correcta. Copia la cadena al código.';
    }catch(e){
      st.style.color='#B03030'; st.textContent='✕ Error de conexión. Revisa el token y el Gist ID.';
    }
  });

  document.getElementById('cfgCopy')?.addEventListener('click', ()=>{
    const out = document.getElementById('cfgOutput');
    out.select(); document.execCommand('copy');
    document.getElementById('cfgCopy').textContent = '✓ Copiado';
  });
}

// ── Sync status indicator ──
function setSync(state, msg){
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status ' + state;
  const icons = { syncing:'⟳', ok:'✓', err:'✕', local:'○', '':'' };
  el.textContent = (icons[state]||'') + (msg ? ' '+msg : '');
}

// ── Debounce ──
let saveTimer = null;
function scheduleSave(){
  clearTimeout(saveTimer);
  saveTimer = setTimeout(()=> save(), 1200);
}

// ── Texto seguro para innerHTML ──
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Migración del formato antiguo (una sola lista, sin "lists") ──────────
function migrateOldFormat(d){
  const deleted = d.deletedCategories || {};
  const categories = DEFAULT_CATEGORIES.filter(c=>!deleted[c.id]).map(c=>({
    id: c.id, icon: c.icon, accent: c.accent,
    title: (d.customTitles && d.customTitles[c.id]) || c.title,
    items: (d.customItems && d.customItems[c.id]) || c.items.slice()
  }));
  (d.customCategories||[]).forEach(cc=>{
    categories.push({ id:cc.id, icon:cc.icon||'📦', title:cc.title, accent:cc.accent||'#2C3E2D', items:(cc.items||[]).slice() });
  });
  const id = 'lista-camping-2026';
  return {
    lists: [{ id, name:'Lista Camping 2026', date:'2026-07-01', categories, checks: d.checks || {} }],
    activeListId: id
  };
}

// ── Garantiza que siempre hay al menos una lista y una activa válida ─────
function ensureDefaultList(){
  if(lists.length){
    if(!activeListId || !lists.find(l=>l.id===activeListId)){
      activeListId = sortedLists()[0].id;
    }
    return;
  }
  const categories = DEFAULT_CATEGORIES.map(c=>({ id:c.id, icon:c.icon, title:c.title, accent:c.accent, items:c.items.slice() }));
  const id = 'lista-camping-2026';
  lists = [{ id, name:'Lista Camping 2026', date:'2026-07-01', categories, checks:{} }];
  activeListId = id;
}

function sortedLists(){
  return lists.slice().sort((a,b)=> (b.date||'').localeCompare(a.date||''));
}

function activeList(){ return lists.find(l=>l.id===activeListId); }

// ── Persistence ──
async function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      let d = JSON.parse(raw);
      if(!d.lists) d = migrateOldFormat(d);
      lists = d.lists || [];
      activeListId = d.activeListId || (lists[0] && lists[0].id) || null;
    }
  }catch(e){}
  ensureDefaultList();

  if(!ENCRYPTED_CONFIG){ setSync('local', 'Setup pendiente'); return; }

  const creds = await getCreds();
  if(!creds){ setSync('err', 'Error al descifrar config'); return; }

  setSync('syncing', 'Cargando desde Gist…');
  try{
    const r = await fetch(`https://api.github.com/gists/${creds.gistId}`, {
      headers:{ 'Authorization':`token ${creds.token}`, 'Accept':'application/vnd.github+json' }
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    const content = data.files?.[GIST_FILENAME]?.content;
    if(content){
      let d = JSON.parse(content);
      if(!d.lists) d = migrateOldFormat(d);
      lists = d.lists || [];
      activeListId = d.activeListId || (lists[0] && lists[0].id) || null;
      ensureDefaultList();
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ lists, activeListId }, null, 2));
    }
    const ts = data.updated_at
      ? new Date(data.updated_at).toLocaleString('es-ES',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})
      : '';
    setSync('ok', 'Sincronizado' + (ts ? ' · '+ts : ''));
  }catch(e){
    setSync('err', 'Sin conexión · datos locales');
    console.warn('Gist load error:', e);
  }
}

async function save(){
  const payload = JSON.stringify({ lists, activeListId }, null, 2);
  try{ localStorage.setItem(STORAGE_KEY, payload); }catch(e){}

  if(!ENCRYPTED_CONFIG) return;
  const creds = await getCreds();
  if(!creds) return;

  setSync('syncing', 'Guardando…');
  try{
    const r = await fetch(`https://api.github.com/gists/${creds.gistId}`, {
      method:'PATCH',
      headers:{
        'Authorization':`token ${creds.token}`,
        'Accept':'application/vnd.github+json',
        'Content-Type':'application/json'
      },
      body: JSON.stringify({ files:{ [GIST_FILENAME]:{ content: payload } } })
    });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const ts = new Date().toLocaleString('es-ES',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    setSync('ok', 'Guardado · '+ts);
  }catch(e){
    setSync('err', 'Error al guardar · cambios en local');
    console.error('Gist save error:', e);
  }
}

// ── Helpers de categorías (operan siempre sobre la lista activa) ─────────
function getAllCategories(){ return activeList().categories; }
function findCat(catId){ return activeList().categories.find(c=>c.id===catId); }

function getItems(catId){ return findCat(catId).items.slice(); }
function getTitle(catId){ return findCat(catId).title; }

function setTitle(catId, val){
  const c = findCat(catId);
  c.title = val.trim() || c.title;
}

function setItems(catId, arr){
  const checks = activeList().checks;
  // Re-map checks: build fresh check map by text so we don't lose state after reorder/delete
  const oldItems = getItems(catId);
  const oldChecks = {};
  oldItems.forEach((txt,i)=>{ if(checks[catId+':'+i]) oldChecks[txt]=true; });
  findCat(catId).items = arr;
  // Clear old keys for this cat
  Object.keys(checks).filter(k=>k.startsWith(catId+':')).forEach(k=>delete checks[k]);
  arr.forEach((txt,i)=>{ if(oldChecks[txt]) checks[catId+':'+i]=true; });
}

function addCategory(title, icon, accent){
  const id = 'cat-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  activeList().categories.push({ id, icon: icon || '📦', title, accent: accent || '#2C3E2D', items: [] });
}

function deleteCategory(catId){
  const al = activeList();
  al.categories = al.categories.filter(c=>c.id!==catId);
  Object.keys(al.checks).filter(k=>k.startsWith(catId+':')).forEach(k=>delete al.checks[k]);
  delete editMode[catId];
  delete collapsed[catId];
}

function allKeys(){
  const keys=[];
  getAllCategories().forEach(c=>c.items.forEach((_,i)=>keys.push(c.id+':'+i)));
  return keys;
}

// ── Helpers de listas ──────────────────────────────────────────────────
function addList(name, date){
  const id = 'list-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  lists.push({ id, name, date: date || '', categories: [], checks: {} });
  return id;
}

function deleteList(listId){
  lists = lists.filter(l=>l.id!==listId);
  if(activeListId===listId) activeListId = null;
  ensureDefaultList();
}

// ── Sidebar (menú de listas) ──────────────────────────────────────────
function openSidebar(){
  sidebarOpen = true;
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('open');
}
function closeSidebar(){
  sidebarOpen = false;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function renderSidebar(){
  const listEl = document.getElementById('sidebarList');
  listEl.innerHTML = '';

  sortedLists().forEach(l=>{
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (l.id===activeListId ? ' active' : '');

    if(editingListId === l.id){
      item.innerHTML = `
        <div style="flex:1;">
          <input type="text" class="sidebar-item-input" id="editListName" value="${escapeHtml(l.name)}" placeholder="Nombre de la lista">
          <input type="date" class="sidebar-item-date" id="editListDate" value="${l.date||''}">
          <div class="sidebar-item-edit-actions">
            <button class="sidebar-item-save" id="editListSave">Guardar</button>
            <button class="sidebar-item-cancel" id="editListCancel">Cancelar</button>
          </div>
        </div>
      `;
      listEl.appendChild(item);
      document.getElementById('editListSave').addEventListener('click', ()=>{
        const name = document.getElementById('editListName').value.trim();
        const date = document.getElementById('editListDate').value;
        if(name) l.name = name;
        l.date = date;
        editingListId = null;
        scheduleSave();
        render();
      });
      document.getElementById('editListCancel').addEventListener('click', ()=>{ editingListId=null; render(); });
      return;
    }

    const keys = l.categories.flatMap(c=>c.items.map((_,i)=>c.id+':'+i));
    const done = keys.filter(k=>l.checks[k]).length;
    const dateLabel = l.date ? new Date(l.date+'T00:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) : 'Sin fecha';
    item.innerHTML = `
      <div class="sidebar-item-main" data-selectlist="${l.id}">
        <div class="sidebar-item-name">${escapeHtml(l.name)}</div>
        <div class="sidebar-item-meta">${dateLabel} · ${done}/${keys.length}</div>
      </div>
      <div class="sidebar-item-actions">
        <button class="sidebar-item-btn" data-editlist="${l.id}" title="Editar">✏️</button>
        <button class="sidebar-item-btn" data-dellist="${l.id}" title="Eliminar">🗑️</button>
      </div>
    `;
    listEl.appendChild(item);
  });

  listEl.querySelectorAll('[data-selectlist]').forEach(el=>{
    el.addEventListener('click', ()=>{
      activeListId = el.dataset.selectlist;
      editMode = {}; collapsed = {}; addingCategory = false;
      closeSidebar();
      render();
    });
  });
  listEl.querySelectorAll('[data-editlist]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      editingListId = el.dataset.editlist;
      render();
    });
  });
  listEl.querySelectorAll('[data-dellist]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      const l = lists.find(x=>x.id===el.dataset.dellist);
      if(!confirm(`¿Eliminar la lista "${l.name}" y todo su contenido?`)) return;
      deleteList(l.id);
      scheduleSave();
      render();
    });
  });

  // ── pie del sidebar: añadir nueva lista ──
  const foot = document.getElementById('sidebarFoot');
  foot.innerHTML = '';
  if(addingList){
    const wrap = document.createElement('div');
    wrap.className = 'sidebar-add-form';
    const today = new Date().toISOString().slice(0,10);
    wrap.innerHTML = `
      <input type="text" id="newListName" class="sidebar-item-input" placeholder="Nombre de la lista">
      <input type="date" id="newListDate" class="sidebar-item-date" value="${today}">
      <div class="sidebar-item-edit-actions">
        <button class="sidebar-item-save" id="newListConfirm">Crear</button>
        <button class="sidebar-item-cancel" id="newListCancel">Cancelar</button>
      </div>
    `;
    foot.appendChild(wrap);
    const doCreateList = ()=>{
      const name = document.getElementById('newListName').value.trim();
      if(!name) return;
      const date = document.getElementById('newListDate').value;
      const id = addList(name, date);
      activeListId = id;
      addingList = false;
      editMode = {}; collapsed = {}; addingCategory = false;
      scheduleSave();
      closeSidebar();
      render();
    };
    document.getElementById('newListConfirm').addEventListener('click', doCreateList);
    document.getElementById('newListName').addEventListener('keydown', e=>{ if(e.key==='Enter') doCreateList(); });
    document.getElementById('newListCancel').addEventListener('click', ()=>{ addingList=false; render(); });
    setTimeout(()=>document.getElementById('newListName')?.focus(), 50);
  } else {
    const btn = document.createElement('button');
    btn.className = 'sidebar-add-btn';
    btn.textContent = '+ Nueva lista';
    btn.addEventListener('click', ()=>{ addingList = true; render(); });
    foot.appendChild(btn);
  }
}

// ── Rendering ──
function render(){
  ensureDefaultList();
  renderSidebar();

  const al = activeList();
  document.getElementById('listTitle').textContent = al.name;
  document.getElementById('listEyebrow').textContent = al.date
    ? new Date(al.date+'T00:00:00').toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'})
    : 'Sin fecha asignada';

  const checks = al.checks;
  const main = document.getElementById('main');
  main.innerHTML = '';
  getAllCategories().forEach(cat => {
    const items = getItems(cat.id);
    const checkedCount = items.filter((_,i)=>!!checks[cat.id+':'+i]).length;
    const isEdit = !!editMode[cat.id];
    const isCollapsed = !!collapsed[cat.id];

    const card = document.createElement('div');
    card.className = 'category' + (isEdit?' edit-active':'') + (isCollapsed?' collapsed':'');
    card.style.setProperty('--accent', cat.accent);
    card.dataset.catId = cat.id;

    // ── Header ──
    const head = document.createElement('div');
    head.className = 'category-head';
    const displayTitle = getTitle(cat.id);
    head.innerHTML = `
      <div class="category-head-left">
        <span class="cat-icon">${escapeHtml(cat.icon)}</span>
        <span class="cat-title">${escapeHtml(displayTitle)}</span>
        <span class="cat-count" data-countfor="${cat.id}">${checkedCount}/${items.length}</span>
        <span class="chevron">▼</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        ${isEdit ? `<button class="del-btn" data-delcat="${cat.id}" title="Eliminar categoría" style="font-size:16px;">🗑️</button>` : ''}
        <button class="edit-toggle" data-editcat="${cat.id}">${isEdit ? '✓ Listo' : '✏️ Editar'}</button>
      </div>
    `;
    head.querySelector('.category-head-left').addEventListener('click', ()=>{
      collapsed[cat.id] = !collapsed[cat.id];
      render();
    });
    head.querySelector('.edit-toggle').addEventListener('click', e=>{
      e.stopPropagation();
      editMode[cat.id] = !editMode[cat.id];
      if(editMode[cat.id]) collapsed[cat.id] = false;
      render();
    });
    head.querySelector('[data-delcat]')?.addEventListener('click', e=>{
      e.stopPropagation();
      if(!confirm(`¿Eliminar la categoría "${displayTitle}" y todos sus artículos?`)) return;
      deleteCategory(cat.id);
      scheduleSave();
      render();
    });
    card.appendChild(head);

    // ── Items container ──
    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'items';

    if(isEdit){
      // ── Category title edit row ──
      const titleRow = document.createElement('div');
      titleRow.className = 'cat-title-edit-row';
      const titleLabel = document.createElement('span');
      titleLabel.className = 'cat-title-edit-label';
      titleLabel.textContent = 'Categoría';
      const titleInput = document.createElement('input');
      titleInput.type = 'text';
      titleInput.className = 'cat-title-edit';
      titleInput.value = getTitle(cat.id);
      titleInput.placeholder = 'Nombre de categoría';
      titleInput.addEventListener('change', ()=>{
        setTitle(cat.id, titleInput.value);
        scheduleSave();
        head.querySelector('.cat-title').textContent = getTitle(cat.id);
      });
      titleInput.addEventListener('keydown', e=>{ if(e.key==='Enter') titleInput.blur(); });
      titleRow.appendChild(titleLabel);
      titleRow.appendChild(titleInput);
      itemsDiv.appendChild(titleRow);
      items.forEach((txt, i)=>{
        const row = document.createElement('div');
        row.className = 'item edit-item';
        row.draggable = true;
        row.dataset.idx = i;

        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '⠿';

        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'item-label-edit';
        input.value = txt;
        input.placeholder = 'Nombre del artículo';
        input.addEventListener('change', ()=>{
          const arr = getItems(cat.id);
          arr[i] = input.value.trim() || txt;
          setItems(cat.id, arr);
          scheduleSave();
          updateCountAndProgress();
        });
        input.addEventListener('keydown', e=>{ if(e.key==='Enter') input.blur(); });

        const del = document.createElement('button');
        del.className = 'del-btn';
        del.title = 'Eliminar';
        del.innerHTML = '🗑️';
        del.addEventListener('click', ()=>{
          const arr = getItems(cat.id);
          arr.splice(i, 1);
          setItems(cat.id, arr);
          scheduleSave();
          render();
        });

        row.appendChild(handle);
        row.appendChild(input);
        row.appendChild(del);
        itemsDiv.appendChild(row);
      });

      // ── Drag-and-drop reorder ──
      let dragSrc = null;
      itemsDiv.querySelectorAll('.edit-item').forEach(row=>{
        row.addEventListener('dragstart', e=>{ dragSrc=row; e.dataTransfer.effectAllowed='move'; });
        row.addEventListener('dragover',  e=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; row.style.opacity='.5'; });
        row.addEventListener('dragleave', ()=>{ row.style.opacity=''; });
        row.addEventListener('drop', e=>{
          e.preventDefault();
          row.style.opacity='';
          if(dragSrc===row) return;
          const fromIdx = parseInt(dragSrc.dataset.idx);
          const toIdx   = parseInt(row.dataset.idx);
          const arr = getItems(cat.id);
          const [moved] = arr.splice(fromIdx,1);
          arr.splice(toIdx,0,moved);
          setItems(cat.id, arr);
          scheduleSave();
          render();
        });
        row.addEventListener('dragend', ()=>{ itemsDiv.querySelectorAll('.edit-item').forEach(r=>r.style.opacity=''); });
      });

      // ── Add new item row ──
      const addRow = document.createElement('div');
      addRow.className = 'add-row';
      const addInput = document.createElement('input');
      addInput.type = 'text';
      addInput.placeholder = 'Nuevo artículo…';
      const addBtn = document.createElement('button');
      addBtn.textContent = '+ Añadir';
      const doAdd = ()=>{
        const val = addInput.value.trim();
        if(!val) return;
        const arr = getItems(cat.id);
        arr.push(val);
        setItems(cat.id, arr);
        scheduleSave();
        addInput.value = '';
        render();
        // re-focus add input after render
        setTimeout(()=>{
          const el = document.querySelector(`[data-catId="${cat.id}"] .add-row input`);
          if(el){ el.focus(); editMode[cat.id]=true; }
        }, 50);
      };
      addBtn.addEventListener('click', doAdd);
      addInput.addEventListener('keydown', e=>{ if(e.key==='Enter') doAdd(); });
      addRow.appendChild(addInput);
      addRow.appendChild(addBtn);
      itemsDiv.appendChild(addRow);

    } else {
      // NORMAL MODE: checkboxes
      items.forEach((txt, i)=>{
        const key = cat.id+':'+i;
        const checked = !!checks[key];
        const row = document.createElement('div');
        row.className = 'item' + (checked?' checked':'');
        const cbId = 'cb-'+cat.id+'-'+i;
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.id = cbId;
        cb.checked = checked;
        const lbl = document.createElement('label');
        lbl.htmlFor = cbId;
        lbl.textContent = txt;
        cb.addEventListener('change', ()=>{
          checks[key] = cb.checked;
          row.classList.toggle('checked', cb.checked);
          scheduleSave();
          updateCountAndProgress();
          card.querySelector(`[data-countfor="${cat.id}"]`).textContent =
            getItems(cat.id).filter((_,j)=>!!checks[cat.id+':'+j]).length + '/' + getItems(cat.id).length;
        });
        row.appendChild(cb);
        row.appendChild(lbl);
        itemsDiv.appendChild(row);
      });
    }

    card.appendChild(itemsDiv);
    card.dataset.catId = cat.id;
    main.appendChild(card);
  });

  // ── Añadir nueva categoría ──
  const addCatWrap = document.createElement('div');
  if(addingCategory){
    addCatWrap.style.cssText = 'background:#FBF7EE;border:1px dashed #DCD0B6;border-radius:8px;padding:14px;margin-bottom:14px;';
    addCatWrap.innerHTML = `
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <input id="newCatIcon" type="text" maxlength="2" placeholder="📦" style="width:48px;text-align:center;border:1px solid #DCD0B6;border-radius:6px;padding:8px;font-size:16px;box-sizing:border-box;">
        <input id="newCatTitle" type="text" placeholder="Nombre de la categoría" style="flex:1;border:1px solid #DCD0B6;border-radius:6px;padding:8px 10px;font-family:Inter,sans-serif;font-size:14px;box-sizing:border-box;">
        <input id="newCatColor" type="color" value="#2C3E2D" style="width:42px;border:1px solid #DCD0B6;border-radius:6px;padding:0;cursor:pointer;">
      </div>
      <div style="display:flex;gap:8px;">
        <button id="newCatConfirm" style="background:#2C3E2D;color:white;border:none;border-radius:6px;padding:8px 16px;font-weight:600;font-size:13px;cursor:pointer;">Crear categoría</button>
        <button id="newCatCancel" style="background:none;border:1px solid #DCD0B6;color:#6B6256;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;">Cancelar</button>
      </div>
    `;
    main.appendChild(addCatWrap);
    const doCreate = ()=>{
      const title = document.getElementById('newCatTitle').value.trim();
      if(!title) return;
      const icon  = document.getElementById('newCatIcon').value.trim() || '📦';
      const color = document.getElementById('newCatColor').value || '#2C3E2D';
      addCategory(title, icon, color);
      scheduleSave();
      addingCategory = false;
      render();
    };
    document.getElementById('newCatConfirm').addEventListener('click', doCreate);
    document.getElementById('newCatTitle').addEventListener('keydown', e=>{ if(e.key==='Enter') doCreate(); });
    document.getElementById('newCatCancel').addEventListener('click', ()=>{ addingCategory=false; render(); });
    setTimeout(()=>document.getElementById('newCatTitle')?.focus(), 50);
  } else {
    addCatWrap.style.cssText = 'display:flex;justify-content:center;margin-bottom:14px;';
    addCatWrap.innerHTML = `<button id="newCatBtn" style="background:none;border:1px dashed #DCD0B6;color:#6B6256;border-radius:8px;padding:12px;width:100%;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;">+ Añadir categoría</button>`;
    main.appendChild(addCatWrap);
    document.getElementById('newCatBtn').addEventListener('click', ()=>{ addingCategory=true; render(); });
  }

  updateCountAndProgress();
}

function updateCountAndProgress(){
  const al = activeList();
  const checks = al.checks;
  const keys = allKeys();
  const total = keys.length;
  const done  = keys.filter(k=>checks[k]).length;
  const pct   = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
  getAllCategories().forEach(c=>{
    const el = document.querySelector(`[data-countfor="${c.id}"]`);
    if(el){
      const items=getItems(c.id);
      el.textContent = items.filter((_,i)=>!!checks[c.id+':'+i]).length+'/'+items.length;
    }
  });
}

document.getElementById('menuBtn').addEventListener('click', openSidebar);
document.getElementById('sidebarClose').addEventListener('click', closeSidebar);
document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

document.getElementById('resetBtn').addEventListener('click', async ()=>{
  const checks = activeList().checks;
  Object.keys(checks).forEach(k=>delete checks[k]);
  await save();
  render();
});

document.getElementById('exportBtn').addEventListener('click', ()=>{
  const data = JSON.stringify({ lists, activeListId }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'listas-camping.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('importFile').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    let d = JSON.parse(text);
    if(!d.lists) d = migrateOldFormat(d);
    lists = d.lists || [];
    activeListId = d.activeListId || (lists[0] && lists[0].id) || null;
    ensureDefaultList();
    await save();
    render();
  }catch(err){
    alert('El archivo no es válido o está corrupto.');
  }
  // reset input so the same file can be re-imported if needed
  e.target.value = '';
});

(async function init(){
  if(!ENCRYPTED_CONFIG){
    ensureDefaultList();
    render();           // renderiza categorías vacías con barra de progreso
    showSetupScreen();  // superpone panel de setup en main
    return;
  }
  await load();
  render();
})();
</script>
</body>
</html>
